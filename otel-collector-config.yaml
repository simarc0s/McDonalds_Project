receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  # Use explicit otlp_grpc exporter to Tempo
  otlp_grpc/tempo:
    endpoint: tempo:4317 # Send traces to the Tempo backend
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp_grpc/tempo]