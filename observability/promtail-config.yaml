server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/log/docker.log

  - job_name: flask
    static_configs:
      - targets:
          - localhost
        labels:
          job: flask
          __path__: /var/lib/docker/containers/*/*-json.log

clients:
  - url: http://loki:3100/loki/api/v1/push
