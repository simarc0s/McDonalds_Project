services:
  # 1. The OTel Collector — receives traces from the app and forwards them to Tempo
  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC port (Flask sends traces here)
      - "4318:4318" # OTLP HTTP port
    depends_on:
      - tempo # Ensure Tempo is up before the collector tries to export to it

  # 2. Tempo — distributed tracing backend (stores and queries traces)
  tempo:
    image: grafana/tempo:2.4.1
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200" # Tempo HTTP API (used by Grafana)
      - "4319:4317" # Tempo OTLP gRPC ingest (from collector inside Docker)
      - "4320:4318" # Tempo OTLP HTTP ingest (optional)

  # 3. Grafana — visualization dashboard
  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./observability/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./observability/grafana/dashboard-provisioning.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - otel-collector
      - prometheus
      - loki
      - mimir

  # 4. Prometheus — scrapes app metrics from Flask /metrics endpoint
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--remote_write.url=http://mimir:9009/api/prom/push"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-storage:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - mimir

  # 5. Mimir — long-term storage backend for Prometheus metrics
  mimir:
    image: grafana/mimir:latest
    command: 
      - "-config.file=/etc/mimir.yaml"
    volumes:
      - ./observability/mimir-config.yaml:/etc/mimir.yaml
      - mimir-storage:/mimir-storage
    ports:
      - "9009:9009" # Mimir HTTP API
      - "9010:9010" # Mimir gRPC
    environment:
      - LOG_LEVEL=info

  # 6. Loki — log aggregation backend
  loki:
    image: grafana/loki:latest
    command: 
      - "-config.file=/etc/loki-config.yaml"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki-config.yaml
      - loki-storage:/loki
    ports:
      - "3100:3100" # Loki HTTP API

  # 7. Promtail — log collector agent (collects logs and sends to Loki)
  promtail:
    image: grafana/promtail:latest
    command:
      - -config.file=/etc/promtail-config.yaml
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail-config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

volumes:
  prometheus-storage:
  mimir-storage:
  loki-storage: